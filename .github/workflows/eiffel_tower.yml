name: Generate Live Eiffel Tower Tower

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Tower Generator Script
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python .github/scripts/generate_tower.py

      - name: Commit and push generated SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics.eiffel.svg
          git commit -m "chore: update live eiffel tower contribution silhouette [skip ci]" || exit 0
          git push