<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 700; fill: #39d353; font-size: 16px; }
      .header-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 700; fill: #f0f6fc; font-size: 18px; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #c9d1d9; font-size: 13px; }
      .dim-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #8b949e; font-size: 11px; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6px; }
    </style>
  </defs>

  <!-- Main Background -->
  <rect width="800" height="820" rx="8" fill="url(#bgGradient)" />

  <!-- Top Header Title -->
  <text x="30" y="35" class="header-title">📊 GitHub Stats</text>

  <!-- ================= TOP LEFT CARD: STATS ================= -->
  <g transform="translate(20, 50)">
    <rect width="370" height="220" class="card" />
    <text x="25" y="35" class="title">Stats</text>
    
    <text x="25" y="70" class="text">⭐ Total Stars:</text>
    <text x="160" y="70" class="text" font-weight="600">2</text>
    
    <text x="25" y="100" class="text">🚀 2026 Commits:</text>
    <text x="160" y="100" class="text" font-weight="600">33</text>
    
    <text x="25" y="130" class="text">🔀 Total PRs:</text>
    <text x="160" y="130" class="text" font-weight="600">4</text>
    
    <text x="25" y="160" class="text">⚠️ Total Issues:</text>
    <text x="160" y="160" class="text" font-weight="600">0</text>
    
    <text x="25" y="190" class="text">📦 Contributed to:</text>
    <text x="160" y="190" class="text" font-weight="600">2</text>

    <!-- Octocat Silhouette Graphic Placeholder -->
    <circle cx="295" cy="125" r="45" fill="#1f6feb" opacity="0.15" />
    <circle cx="295" cy="125" r="35" fill="#0366d6" />
  </g>

  <!-- ================= TOP RIGHT CARD: COMMITS BY HOUR ================= -->
  <g transform="translate(410, 50)">
    <rect width="370" height="220" class="card" />
    <text x="25" y="35" class="title">Commits (UTC +5:30)</text>
    
    <!-- Axis lines -->
    <line x1="40" y1="170" x2="330" y2="170" stroke="#30363d" stroke-width="1" />
    <line x1="40" y1="70" x2="40" y2="170" stroke="#30363d" stroke-width="1" />
    
    <!-- Y Axis Labels -->
    <text x="25" y="173" class="dim-text">0</text>
    <text x="20" y="130" class="dim-text">10</text>
    <text x="20" y="85" class="dim-text">20</text>

    <!-- Histograms Bars (Light Green Theme) -->
    <rect x="100" y="150" width="12" height="20" fill="#39d353" rx="2" />
    <rect x="130" y="120" width="12" height="50" fill="#39d353" rx="2" />
    <rect x="160" y="155" width="12" height="15" fill="#39d353" rx="2" />
    <rect x="190" y="90" width="12" height="80" fill="#39d353" rx="2" />
    <rect x="220" y="115" width="12" height="55" fill="#39d353" rx="2" />
    <rect x="250" y="150" width="12" height="20" fill="#39d353" rx="2" />
    <rect x="280" y="135" width="12" height="35" fill="#39d353" rx="2" />

    <!-- X Axis Labels -->
    <text x="40" y="190" class="dim-text">0</text>
    <text x="130" y="190" class="dim-text">8</text>
    <text x="220" y="190" class="dim-text">16</text>
    <text x="310" y="190" class="dim-text">23</text>
    <text x="285" y="205" class="dim-text">per day hour</text>
  </g>

  <!-- ================= MIDDLE LEFT CARD: TOP LANGUAGES BY REPO ================= -->
  <g transform="translate(20, 290)">
    <rect width="370" height="240" class="card" />
    <text x="25" y="35" class="title">Top Languages by Repo</text>
    
    <!-- Language Legend Items -->
    <rect x="25" y="75" width="10" height="10" fill="#3178c6" rx="2" />
    <text x="45" y="84" class="text">Python</text>

    <rect x="25" y="115" width="10" height="10" fill="#00b4ab" rx="2" />
    <text x="45" y="124" class="text">C</text>

    <rect x="25" y="155" width="10" height="10" fill="#563d7c" rx="2" />
    <text x="45" y="164" class="text">HTML / CSS</text>

    <!-- Donut Chart Graphics -->
    <circle cx="270" cy="140" r="55" fill="none" stroke="#21262d" stroke-width="22" />
    <circle cx="270" cy="140" r="55" fill="none" stroke="#3178c6" stroke-width="22" stroke-dasharray="210 345" />
    <circle cx="270" cy="140" r="55" fill="none" stroke="#00b4ab" stroke-width="22" stroke-dasharray="90 345" stroke-dashoffset="-210" />
    <circle cx="270" cy="140" r="55" fill="none" stroke="#563d7c" stroke-width="22" stroke-dasharray="45 345" stroke-dashoffset="-300" />
  </g>

  <!-- ================= MIDDLE RIGHT CARD: TOP LANGUAGES BY COMMIT ================= -->
  <g transform="translate(410, 290)">
    <rect width="370" height="240" class="card" />
    <text x="25" y="35" class="title">Top Languages by Commit</text>
    
    <rect x="25" y="85" width="10" height="10" fill="#3178c6" rx="2" />
    <text x="45" y="94" class="text">Python</text>

    <rect x="25" y="125" width="10" height="10" fill="#00b4ab" rx="2" />
    <text x="45" y="134" class="text">C</text>

    <!-- Donut Chart Graphics -->
    <circle cx="260" cy="140" r="55" fill="none" stroke="#21262d" stroke-width="22" />
    <circle cx="260" cy="140" r="55" fill="none" stroke="#3178c6" stroke-width="22" stroke-dasharray="240 345" />
    <circle cx="260" cy="140" r="55" fill="none" stroke="#00b4ab" stroke-width="22" stroke-dasharray="105 345" stroke-dashoffset="-240" />
  </g>

  <!-- ================= BOTTOM FULL CARD: ACTIVITY TIMELINE ================= -->
  <g transform="translate(20, 540)">
    <rect width="760" height="255" class="card" />
    
    <text x="25" y="35" class="title">debjeetxyz (Gaurav)</text>
    
    <!-- User Info Sidebar -->
    <text x="25" y="80" class="text">🚀 33 Contributions in 2026</text>
    <text x="25" y="115" class="text">📦 Public Repositories Active</text>
    <text x="25" y="150" class="text">🕒 Joined GitHub July 9, 2026</text>
    <text x="25" y="185" class="text">📍 India</text>

    <!-- Activity Wave Graph (Light Green Theme) -->
    <path d="M 340 210 Q 380 210 410 180 T 480 80 T 550 190 T 650 205 L 730 205 L 730 210 L 340 210 Z" fill="#39d353" fill-opacity="0.3" />
    <path d="M 340 210 Q 380 210 410 180 T 480 80 T 550 190 T 650 205 L 730 205" fill="none" stroke="#39d353" stroke-width="2.5" />

    <!-- Graph Axes & Grid Lines -->
    <line x1="330" y1="210" x2="735" y2="210" stroke="#30363d" stroke-width="1" />
    <line x1="735" y1="70" x2="735" y2="210" stroke="#30363d" stroke-width="1" />

    <!-- Y-Axis Labels -->
    <text x="742" y="213" class="dim-text">0</text>
    <text x="742" y="180" class="dim-text">10</text>
    <text x="742" y="145" class="dim-text">20</text>
    <text x="742" y="110" class="dim-text">30</text>
    <text x="742" y="75" class="dim-text">40</text>

    <!-- X-Axis Date Labels -->
    <text x="350" y="232" class="dim-text">Jul 9</text>
    <text x="470" y="232" class="dim-text">Aug</text>
    <text x="590" y="232" class="dim-text">Sep</text>
    <text x="700" y="232" class="dim-text">Oct</text>

    <text x="615" y="45" class="dim-text">contributions in the last year</text>
  </g>

</svg>
